image:
  repository: ghcr.io/jb2dev/jac
  tag: "latest"
  pullPolicy: Always

replicaCount: 2

serviceAccount:
  create: true
  automountToken: false

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: jac.local
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

probes:
  startup:
    path: /actuator/health/liveness
    failureThreshold: 12
    periodSeconds: 5
    timeoutSeconds: 3
  liveness:
    path: /actuator/health/liveness
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 3
  readiness:
    path: /actuator/health/readiness
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 3

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

metrics:
  enabled: true
  path: /actuator/prometheus
  port: "8080"

serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 15s
  scrapeTimeout: 10s

env:
  SPRING_PROFILES_ACTIVE: "kubernetes"
  SERVER_PORT: "8080"
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_JB2DEV: "INFO"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,loggers"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

terminationGracePeriodSeconds: 30